name: Build Linux binary

# Builds a Linux x86_64 binary of Fragnetic (server + browser UI) and attaches it to
# each published Release. Windows-only features (recording, WASAPI audio, firewall
# region-lock, image-gen/voice sidecars) are absent and degrade gracefully; the core
# (UI, region ping, VPN via wg-quick, coach via Ollama) works. Also runs on demand.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the Linux binary to (e.g. v20.24). Leave blank to only build an artifact."
        required: false
        default: ""

permissions:
  contents: write        # needed to upload the asset to the release

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: python -m pip install --upgrade pip pyinstaller pillow cryptography maxminddb

      - name: Build Linux binary
        run: bash build_linux.sh

      - name: Smoke test — starts, serves, and carries NO personal data
        run: |
          set -e
          mkdir -p /tmp/fragcfg
          ./dist/Fragnetic --no-browser --port 8791 --configs /tmp/fragcfg &
          APP_PID=$!
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:8791/api/status >/dev/null 2>&1; then UP=1; break; fi
            sleep 1
          done
          kill $APP_PID 2>/dev/null || true
          [ "${UP:-0}" = "1" ] && echo "server started + served OK" || { echo "server did NOT come up"; exit 1; }
          # privacy: the binary must not embed the owner's personal runtime files
          for s in "fragroute_accounts" "fragroute_weapon_skins" "PBKDF2 password"; do
            if grep -aql "$s" dist/Fragnetic; then echo "LEAK: '$s' embedded in binary"; exit 1; fi
          done
          echo "privacy check passed — no personal data in the binary"

      - name: Package (binary + icon + native-app installer)
        run: |
          mkdir -p out/Fragnetic
          cp dist/Fragnetic out/Fragnetic/
          cp assets/fragroute.png out/Fragnetic/fragnetic.png 2>/dev/null || true
          cp linux/install.sh out/Fragnetic/install.sh
          cp README.md out/Fragnetic/README.md 2>/dev/null || true
          chmod +x out/Fragnetic/Fragnetic out/Fragnetic/install.sh
          cd out && tar -czf Fragnetic-linux-x86_64.tar.gz Fragnetic
          ls -lh Fragnetic-linux-x86_64.tar.gz

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: Fragnetic-linux-x86_64
          path: out/Fragnetic-linux-x86_64.tar.gz

      - name: Attach to the Release
        if: github.event_name == 'release' || github.event.inputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REL_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}
        run: gh release upload "$REL_TAG" out/Fragnetic-linux-x86_64.tar.gz --clobber
